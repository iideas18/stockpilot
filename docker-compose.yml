version: '3.8'

services:
  app:
    build: .
    container_name: stockpilot
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: stockpilot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stockpilot}
      MYSQL_DATABASE: stockpilot
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
